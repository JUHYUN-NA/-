<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 할 일</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #EDE9DF;
      --card: #F7F4EE;
      --ink: #1A1A2E;
      --ink-muted: #6B6873;
      --accent-green: #3D9E5A;
      --accent-green-light: #EAF5EE;
      --accent-red: #D94F4F;
      --accent-red-light: #FDEAEA;
      --border: #D9D4C8;
      --shadow: 0 2px 12px rgba(26,26,46,0.08);
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 40px 16px 80px;
    }

    /* ── Header ── */
    header {
      max-width: 560px;
      margin: 0 auto 32px;
    }

    .date-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 4px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 6vw, 2.8rem);
      line-height: 1.1;
      color: var(--ink);
    }

    h1 em {
      font-style: italic;
      color: var(--accent-green);
    }

    .stats {
      margin-top: 10px;
      font-size: 13px;
      color: var(--ink-muted);
    }

    .stats span {
      font-weight: 600;
      color: var(--ink);
    }

    /* ── Input ── */
    .input-wrap {
      max-width: 560px;
      margin: 0 auto 20px;
      display: flex;
      gap: 8px;
    }

    #new-todo {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }

    #new-todo::placeholder { color: var(--ink-muted); }
    #new-todo:focus { border-color: var(--ink); }

    #add-btn {
      padding: 14px 22px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    #add-btn:hover { opacity: 0.85; }
    #add-btn:active { transform: scale(0.97); }

    /* ── Filter tabs ── */
    .filters {
      max-width: 560px;
      margin: 0 auto 16px;
      display: flex;
      gap: 6px;
    }

    .filter-btn {
      padding: 6px 14px;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--ink-muted); color: var(--ink); }

    .filter-btn.active {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
    }

    /* ── List ── */
    #todo-list {
      max-width: 560px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Item ── */
    .todo-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      box-shadow: var(--shadow);
      animation: slide-in 0.2s ease;
      transition: opacity 0.2s;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item.done { opacity: 0.6; background: var(--accent-green-light); border-color: #c3dfc9; }

    /* Custom checkbox */
    .check-wrap {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      position: relative;
      cursor: pointer;
    }

    .check-wrap input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      margin: 0;
    }

    .check-box {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      pointer-events: none;
    }

    .todo-item.done .check-box {
      background: var(--accent-green);
      border-color: var(--accent-green);
    }

    .check-box svg {
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.15s, transform 0.2s cubic-bezier(.34,1.56,.64,1);
    }

    .todo-item.done .check-box svg { opacity: 1; transform: scale(1); }

    /* Text */
    .todo-text {
      flex: 1;
      font-size: 15px;
      font-weight: 400;
      line-height: 1.5;
      position: relative;
      cursor: pointer;
      word-break: break-word;
    }

    .todo-text::after {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      width: 0; height: 1.5px;
      background: var(--ink-muted);
      transition: width 0.3s ease;
    }

    .todo-item.done .todo-text::after { width: 100%; }
    .todo-item.done .todo-text { color: var(--ink-muted); }

    /* Edit input */
    .edit-input {
      flex: 1;
      border: none;
      border-bottom: 2px solid var(--ink);
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: var(--ink);
      outline: none;
      padding: 2px 0;
    }

    /* Actions */
    .item-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .todo-item:hover .item-actions,
    .todo-item:focus-within .item-actions { opacity: 1; }

    .icon-btn {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-muted);
      transition: background 0.15s, color 0.15s;
    }

    .icon-btn:hover { background: var(--border); color: var(--ink); }
    .icon-btn.delete:hover { background: var(--accent-red-light); color: var(--accent-red); }

    /* ── Empty state ── */
    #empty-state {
      max-width: 560px;
      margin: 40px auto;
      text-align: center;
      color: var(--ink-muted);
      display: none;
    }

    #empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
    #empty-state p { font-size: 15px; }

    /* ── Clear done ── */
    .bottom-bar {
      max-width: 560px;
      margin: 20px auto 0;
      display: flex;
      justify-content: flex-end;
    }

    #clear-done-btn {
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--ink-muted);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.15s;
    }

    #clear-done-btn:hover { color: var(--accent-red); }
    #clear-done-btn:disabled { opacity: 0; pointer-events: none; }

    @media (max-width: 400px) {
      #add-btn { padding: 14px 16px; }
    }
  </style>
</head>
<body>

<header>
  <p class="date-label" id="today-date"></p>
  <h1>오늘 <em>할 일</em></h1>
  <p class="stats" id="stats-text"></p>
</header>

<div class="input-wrap">
  <input id="new-todo" type="text" placeholder="새 할 일을 입력하세요…" autocomplete="off" />
  <button id="add-btn">추가</button>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all">전체</button>
  <button class="filter-btn" data-filter="active">진행 중</button>
  <button class="filter-btn" data-filter="done">완료</button>
</div>

<ul id="todo-list"></ul>

<div id="empty-state">
  <div class="emoji" id="empty-emoji">📝</div>
  <p id="empty-msg">아직 할 일이 없어요. 위에서 추가해 보세요!</p>
</div>

<div class="bottom-bar">
  <button id="clear-done-btn" disabled>완료 항목 모두 삭제</button>
</div>

<script>
  const STORAGE_KEY = 'todos_v1';

  // ── State ──
  let todos = [];
  let filter = 'all';

  // ── Load ──
  function load() {
    try {
      todos = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch { todos = []; }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
  }

  // ── Helpers ──
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

  function todayStr() {
    return new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
  }

  // ── Render ──
  function render() {
    const list = document.getElementById('todo-list');
    const empty = document.getElementById('empty-state');
    const clearBtn = document.getElementById('clear-done-btn');
    const statsEl = document.getElementById('stats-text');

    const visible = todos.filter(t => {
      if (filter === 'active') return !t.done;
      if (filter === 'done')   return t.done;
      return true;
    });

    list.innerHTML = '';

    if (visible.length === 0) {
      empty.style.display = 'block';
      const emoji = document.getElementById('empty-emoji');
      const msg   = document.getElementById('empty-msg');
      if (filter === 'done') {
        emoji.textContent = '✨';
        msg.textContent = '완료한 항목이 없어요.';
      } else if (filter === 'active') {
        emoji.textContent = '🎉';
        msg.textContent = '할 일을 모두 완료했어요!';
      } else {
        emoji.textContent = '📝';
        msg.textContent = '아직 할 일이 없어요. 위에서 추가해 보세요!';
      }
    } else {
      empty.style.display = 'none';
    }

    visible.forEach(todo => {
      const li = document.createElement('li');
      li.className = 'todo-item' + (todo.done ? ' done' : '');
      li.dataset.id = todo.id;
      li.innerHTML = `
        <label class="check-wrap">
          <input type="checkbox" ${todo.done ? 'checked' : ''} data-action="toggle" data-id="${todo.id}" />
          <div class="check-box">
            <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
              <path d="M1.5 5L5 8.5L11.5 1.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </label>
        <span class="todo-text" data-action="edit-start" data-id="${todo.id}">${escHtml(todo.text)}</span>
        <div class="item-actions">
          <button class="icon-btn" data-action="edit-start" data-id="${todo.id}" title="수정" aria-label="수정">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <path d="M10.586 1.586a2 2 0 0 1 2.828 2.828L4.828 13H2v-2.828l8.586-8.586z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="icon-btn delete" data-action="delete" data-id="${todo.id}" title="삭제" aria-label="삭제">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 3.5h10M5.5 3.5V2.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 .5.5v1M5 3.5l.5 7.5M9 3.5l-.5 7.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      `;
      list.appendChild(li);
    });

    // Stats
    const total = todos.length;
    const doneCount = todos.filter(t => t.done).length;
    statsEl.innerHTML = total === 0
      ? '할 일을 추가해 보세요'
      : `전체 <span>${total}</span>개 중 <span>${doneCount}</span>개 완료`;

    // Clear done btn
    clearBtn.disabled = !todos.some(t => t.done);
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Actions ──
  function addTodo(text) {
    const t = text.trim();
    if (!t) return;
    todos.unshift({ id: uid(), text: t, done: false, createdAt: Date.now() });
    save();
    render();
  }

  function toggleTodo(id) {
    const t = todos.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTodo(id) {
    todos = todos.filter(t => t.id !== id);
    save();
    render();
  }

  function startEdit(id) {
    const li = document.querySelector(`.todo-item[data-id="${id}"]`);
    if (!li) return;
    const span = li.querySelector('.todo-text');
    const todo = todos.find(t => t.id === id);
    if (!todo || todo.done) return;

    const input = document.createElement('input');
    input.className = 'edit-input';
    input.value = todo.text;
    span.replaceWith(input);
    input.focus();
    input.select();

    function commit() {
      const v = input.value.trim();
      if (v) { todo.text = v; save(); }
      render();
    }
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { input.blur(); }
      if (e.key === 'Escape') { input.value = todo.text; input.blur(); }
    });
  }

  // ── Event delegation ──
  document.getElementById('todo-list').addEventListener('click', e => {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const { action, id } = el.dataset;
    if (action === 'toggle')     toggleTodo(id);
    if (action === 'delete')     deleteTodo(id);
    if (action === 'edit-start') startEdit(id);
  });

  // ── Input ──
  const input = document.getElementById('new-todo');
  document.getElementById('add-btn').addEventListener('click', () => {
    addTodo(input.value);
    input.value = '';
    input.focus();
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      addTodo(input.value);
      input.value = '';
    }
  });

  // ── Filters ──
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  // ── Clear done ──
  document.getElementById('clear-done-btn').addEventListener('click', () => {
    if (!confirm('완료된 항목을 모두 삭제할까요?')) return;
    todos = todos.filter(t => !t.done);
    save();
    render();
  });

  // ── Init ──
  document.getElementById('today-date').textContent = todayStr();
  load();
  render();
</script>
</body>
</html>
